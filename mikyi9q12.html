<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Chat Overlay</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tmi.js/1.4.2/tmi.min.js"></script>
    <style>
        body {
            background-color: transparent; /* Clear background for OBS */
            margin: 0;
            padding: 10px;
            overflow: hidden;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        #chat-container {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            height: 95vh;
            color: #ffffff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000000; /* Makes text readable over gameplay */
        }

        .chat-message {
            margin-bottom: 12px;
            animation: fadeIn 0.3s ease-in-out;
            background: rgba(0, 0, 0, 0.3); /* Slight dark backdrop for clarity */
            padding: 8px 12px;
            border-radius: 8px;
            width: fit-content;
            max-width: 90%;
        }

        /* Your Custom Colors */
        .mod-user {
            color: #FF69B4; /* Hot Pink for Mods/Broadcaster */
        }

        .regular-user {
            color: #FF8C00; /* Dark Orange for Regular Users */
        }

        .message-text {
            color: #FFFFFF;
            font-weight: normal;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div id="chat-container"></div>

    <script>
        // REPLACE THIS WITH YOUR TWITCH CHANNEL NAME
        const channelName = 'YOUR_TWITCH_CHANNEL_NAME'; 

        const client = new tmi.Client({
            channels: [channelName]
        });

        client.connect();

        const chatContainer = document.getElementById('chat-container');

        client.on('message', (channel, tags, message, self) => {
            const messageElement = document.createElement('div');
            messageElement.classList.add('chat-message');

            // Apply your custom role colors
            let userClass = 'regular-user';
            if (tags.mod || tags.badges?.broadcaster === '1') {
                userClass = 'mod-user';
            }

            messageElement.innerHTML = `
                <span class="${userClass}">${tags['display-name']}</span>: 
                <span class="message-text">${message}</span>
            `;

            chatContainer.appendChild(messageElement);
            chatContainer.scrollTop = chatContainer.scrollHeight;

            if (chatContainer.childNodes.length > 20) {
                chatContainer.removeChild(chatContainer.firstChild);
            }
        });
    </script>
</body>
</html>
